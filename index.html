<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shehan Perera | Creative Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --accent: #3d5afe; --bg: #050505; --card-bg: #111111; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; margin: 0; scroll-behavior: smooth; }
        
        header { padding: 60px 20px 30px; text-align: center; }
        h1 { font-size: 3rem; margin: 0; letter-spacing: -2px; font-weight: 800; }
        .subtitle { color: #888; font-size: 1rem; margin-top: 5px; }

        /* Navigation Filter */
        .filter-wrapper { position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); padding: 15px 0; z-index: 100; text-align: center; border-bottom: 1px solid #111; }
        .filter-btn {
            background: none; border: 1px solid #222; color: #777; padding: 10px 20px;
            margin: 5px; cursor: pointer; border-radius: 50px; font-weight: 600; transition: 0.3s; font-size: 0.85rem;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: black; border-color: var(--primary); }

        /* Sub-menu styling */
        #graphic-subs { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1a1a1a; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid & Card Styling */
        .container { max-width: 1200px; margin: auto; padding: 40px 20px; }
        .work-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #1a1a1a; display: block; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #333; }
        
        .thumb { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* හතරැස් පෙනුම */
            object-fit: cover; 
            display: block; 
            background: #1a1a1a; 
        }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .card-info { padding: 20px; text-align: left; }
        .card-info h3 { margin: 0; font-size: 1.2rem; }
        .card-info p { margin: 5px 0 0; font-size: 0.85rem; color: #555; text-transform: uppercase; }

        footer { padding: 40px; color: #222; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>Shehan Perera</h1>
    <p class="subtitle">Digital Creator | Video Editor | Designer</p>
</header>

<div class="filter-wrapper">
    <button class="filter-btn active" onclick="filterSelection('all'); hideSubs()">All Works</button>
    <button class="filter-btn" onclick="toggleGraphicMenu()">Graphic Design ▾</button>
    <button class="filter-btn" onclick="filterSelection('video'); hideSubs()">Video Editing</button>
    <button class="filter-btn" onclick="filterSelection('game'); hideSubs()">Game Dev</button>
    
    <div id="graphic-subs">
        <button class="filter-btn" onclick="filterSelection('design')">All Designs</button>
        <button class="filter-btn" onclick="filterSelection('social')">Social Media</button>
        <button class="filter-btn" onclick="filterSelection('thumbnail')">Thumbnails</button>
        <button class="filter-btn" onclick="filterSelection('logo')">Logos</button>
    </div>
</div>

<div class="container">
    <div class="work-grid" id="grid">
        
        <div class="card design social">
            <img src="https://github.com/shehanpereraofficial/portfolio/blob/main/sample%201.jpg?raw=true" class="thumb">
            <div class="card-info">
                <h3>Promo Poster</h3>
                <p>Design / Social Media</p>
            </div>
        </div>

        <div class="card design thumbnail">
            <img src="https://via.placeholder.com/800x800/111/eee?text=Thumbnail+Project" class="thumb">
            <div class="card-info">
                <h3>Gaming Video Thumbnail</h3>
                <p>Design / YouTube</p>
            </div>
        </div>

        <div class="card design social">

            <div class="card-info">
                <h3>Business Instagram Post</h3>
                <p>Design / Social Media</p>
            </div>
        </div>

        <div class="card design logo">
            <img src="https://via.placeholder.com/800x800/111/eee?text=Logo+Design" class="thumb">
            <div class="card-info">
                <h3>Abstract Brand Logo</h3>
                <p>Design / Logo</p>
            </div>
        </div>

        <div class="card video">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/zhHPURwgmlQ?modestbranding=1&rel=0" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="card-info">
                <h3>Cinematic Video Reel</h3>
                <p>Video Editing</p>
            </div>
        </div>

    </div>
</div>

<footer>&copy; 2026 SHEHANONLINE.ME</footer>

<script>
    function filterSelection(c) {
        var x = document.getElementsByClassName("card");
        if (c == "all") c = "";
        for (var i = 0; i < x.length; i++) {
            x[i].style.display = "none";
            if (x[i].className.indexOf(c) > -1) x[i].style.display = "block";
        }
    }

    function toggleGraphicMenu() {
        var menu = document.getElementById("graphic-subs");
        if (menu.style.display === "block") {
            menu.style.display = "none";
        } else {
            menu.style.display = "block";
            filterSelection('design');
        }
    }
