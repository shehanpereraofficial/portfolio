<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shehan Perera | Video Editor & Digital Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* මූලික සැකසුම් */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: #ffffff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .profile-container {
            padding: 20px;
            max-width: 600px;
        }

        h1 { 
            font-size: 3.5rem; 
            margin-bottom: 10px; 
            letter-spacing: -2px;
            background: linear-gradient(90deg, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            font-size: 1.2rem; 
            color: #888; 
            margin-bottom: 30px; 
            line-height: 1.6;
        }

        /* LinkedIn Button */
        .linkedin-btn {
            display: inline-block;
            padding: 15px 35px;
            background-color: #0077b5; /* LinkedIn Blue */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 10px 20px rgba(0, 119, 181, 0.2);
        }

        .linkedin-btn:hover {
            background-color: #005a8a;
            transform: translateY(-3px);
        }

        /* පසුව වීඩියෝ දැමීමට වෙන් කළ කොටස (දැනට මෙය නොපෙනේ) */
        .work-section {
            display: none; /* පසුව වීඩියෝ දාන විට මෙය 'block' කරන්න */
            width: 100%;
            max-width: 1000px;
            margin-top: 50px;
        }

        footer {
            position: absolute;
            bottom: 30px;
            color: #444;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h1>SHEHAN PERERA</h1>
        <p>Video Editor | Graphic Designer | Digital Creator <br> 
        Specializing in high-impact video content and AI creative solutions.</p>
        
        <a href="www.linkedin.com/in/shehanpereraofficial" target="_blank" class="linkedin-btn">
            Connect on LinkedIn
        </a>
    </div>

    <div class="work-section" id="portfolio">
        <h2>My Work</h2>
        </div>

    <footer>
        &copy; 2026 shehanonline.me | All rights reserved.
    </footer>

</body>
</html>
