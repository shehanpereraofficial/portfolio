<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shehan Perera | Multi-Disciplinary Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080808; color: white; margin: 0; text-align: center; }
        header { padding: 80px 20px 40px; }
        h1 { font-size: 3rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .subtitle { color: #888; font-size: 1.1rem; margin-top: 10px; }

        /* Navigation Tabs */
        .filter-container { margin: 40px 0; }
        .filter-btn {
            background: none; border: 1px solid #333; color: #888; padding: 10px 25px;
            margin: 5px; cursor: pointer; border-radius: 50px; font-weight: 600; transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { background: white; color: black; border-color: white; }

        /* Work Grid */
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        /* Portfolio Cards */
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; display: block; }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .card-info { padding: 15px; text-align: left; }
        .card-info h3 { margin: 0; font-size: 1.1rem; }
        .card-info p { margin: 5px 0 0; font-size: 0.9rem; color: #666; }

        /* LinkedIn Link */
        .contact-btn { display: inline-block; margin-top: 30px; color: #0077b5; text-decoration: none; font-weight: bold; border-bottom: 1px solid #0077b5; padding-bottom: 2px; }
    </style>
</head>
<body>

<header>
    <h1>Shehan Perera</h1>
    <p class="subtitle">Digital Creator specializing in Video, Design & Game Dev</p>
    <a href="https://www.linkedin.com/in/shehan-perera-official" class="contact-btn">Connect on LinkedIn</a>
</header>

<div class="filter-container">
    <button class="filter-btn active" onclick="filterSelection('all')">Show All</button>
    <button class="filter-btn" onclick="filterSelection('design')">Visual Identities</button>
    <button class="filter-btn" onclick="filterSelection('video')">Cinematic Cuts</button>
    <button class="filter-btn" onclick="filterSelection('game')">Interactive Worlds</button>
</div>

<div class="container">
    <div class="work-grid">
        <div class="card design">
            <img src="https://via.placeholder.com/400x250/1a1a1a/ffffff?text=Graphic+Design+Work" alt="Design">
            <div class="card-info">
                <h3>Brand Identity Project</h3>
                <p>Graphic Design</p>
            </div>
        </div>

        <div class="card video">
            <img src="https://via.placeholder.com/400x250/1a1a1a/ffffff?text=Video+Editing+Work" alt="Video">
            <div class="card-info">
                <h3>Commercial Edit</h3>
                <p>Video Editing</p>
            </div>
        </div>

        <div class="card game">
            <img src="https://via.placeholder.com/400x250/1a1a1a/ffffff?text=The+Shadow+Path" alt="Game">
            <div class="card-info">
                <h3>The Shadow Path</h3>
                <p>Game Development</p>
            </div>
        </div>
    </div>
</div>

<script>
    function filterSelection(c) {
        var x, i;
        x = document.getElementsByClassName("card");
        if (c == "all") c = "";
        for (i = 0; i < x.length; i++) {
            x[i].style.display = "none";
            if (x[i].className.indexOf(c) > -1) x[i].style.display = "block";
        }
        // Active button style change
        var btns = document.getElementsByClassName("filter-btn");
        for (var i = 0; i < btns.length; i++) {
            btns[i].addEventListener("click", function(){
                var current = document.getElementsByClassName("active");
                current[0].className = current[0].className.replace(" active", "");
                this.className += " active";
            });
        }
    }
</script>

</body>
</html>
